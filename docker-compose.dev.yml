version: "3.9"
services:
  postgres:
    container_name: postgres_container_dev
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./databaseSeed/seed.sql:/docker-entrypoint-initdb.d/seed.sql
      - type: volume
        source: study-app-vol
        target: /var/lib/postgresql

volumes:
  study-app-vol: { }