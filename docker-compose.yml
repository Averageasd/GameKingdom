version: "3.9"
services:
  postgres:
    container_name: postgres_container
    build: ./databaseDockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - type: volume
        source: study-app-vol
        target: /var/lib/postgresql

volumes:
  study-app-vol: { }